<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Virtual - Xerfan Tech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <div id="header"></div>

    <section class="min-h-[70vh] flex items-center py-20 bg-gradient-to-br from-blue-900 via-blue-800 to-orange-600">
        <div class="container mx-auto px-4 text-center text-white">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Assistente Virtual Xerfan</h1>
            <p class="text-lg text-blue-100 max-w-2xl mx-auto mb-8">
                Nosso chatbot está ativo no canto inferior direito para tirar dúvidas sobre manutenção, automação e desenvolvimento web.
            </p>
            <button id="open-chat-now" class="px-8 py-4 bg-orange-500 hover:bg-orange-600 rounded-lg font-semibold transition-colors">
                <i class="fas fa-comments mr-2"></i>
                Abrir Chat Agora
            </button>
        </div>
    </section>

    <div id="footer"></div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openButton = document.getElementById('open-chat-now');
            openButton?.addEventListener('click', () => {
                const chatButton = document.getElementById('chatbot-button');
                if (chatButton) chatButton.click();
            });
        });
    </script>
</body>
</html>

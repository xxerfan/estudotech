<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Xerfan Tech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/animations.css">
</head>
<body>
    <div id="header"></div>

    <section class="hero-page" style="background: linear-gradient(to right, var(--blue-900), var(--orange-600));">
        <div class="container">
            <h1 class="hero-page-title">Agendar Serviço</h1>
            <p class="hero-page-desc">Escolha o melhor horário para você</p>
        </div>
    </section>

    <section class="section-padding">
        <div class="container" style="max-width: 900px;">
            
            <div class="form-container">
                <form action="#" method="POST">
                    
                    <div class="form-grid-2">
                        <div>
                            <label class="form-label">👤 Nome Completo *</label>
                            <input type="text" class="form-input" placeholder="Seu nome completo" required>
                        </div>
                        <div>
                            <label class="form-label">📧 E-mail *</label>
                            <input type="email" class="form-input" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">📞 Telefone/WhatsApp *</label>
                        <input type="tel" class="form-input" placeholder="(21) 98419-7719" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">💬 Tipo de Serviço *</label>
                        <select class="form-input" required>
                            <option value="">Selecione o serviço</option>
                            <option value="manutencao_pc">Manutenção de PC/Notebook</option>
                            <option value="manutencao_celular">Manutenção de Smartphone</option>
                            <option value="automacao">Automação Residencial</option>
                            <option value="cftv">Instalação de CFTV</option>
                            <option value="videogame">Conserto de Videogame</option>
                            <option value="outro">Outro Serviço</option>
                        </select>
                    </div>

                    <div class="form-grid-2">
                        <div>
                            <label class="form-label">📅 Data Preferida *</label>
                            <input type="date" class="form-input" required>
                        </div>
                        <div>
                            <label class="form-label">⏱️ Horário Preferido *</label>
                            <select class="form-input" required>
                                <option value="">Selecione o horário</option>
                                <option value="08:00">08:00</option>
                                <option value="09:00">09:00</option>
                                <option value="10:00">10:00</option>
                                <option value="11:00">11:00</option>
                                <option value="12:00">12:00</option>
                                <option value="13:00">13:00</option>
                                <option value="14:00">14:00</option>
                                <option value="15:00">15:00</option>
                                <option value="16:00">16:00</option>
                                <option value="17:00">17:00</option>
                                <option value="18:00">18:00</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Descrição do Problema/Serviço</label>
                        <textarea rows="4" class="form-input" placeholder="Descreva o problema ou serviço desejado..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-bottom: 1rem;">
                        Confirmar Agendamento
                    </button>
                    <p style="text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                        * Campos obrigatórios. Entraremos em contato para confirmar o agendamento.
                    </p>
                </form>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
                
                <div class="info-box-center">
                    <div class="icon-box bg-orange-light">⏱️</div>
                    <h3 style="font-weight: bold; margin-bottom: 0.5rem; color: var(--text-primary);">Resposta Rápida</h3>
                    <p style="font-size: 0.875rem; color: var(--text-secondary);">Retornamos em até 24 horas</p>
                </div>

                <div class="info-box-center">
                    <div class="icon-box bg-blue-light">📅</div>
                    <h3 style="font-weight: bold; margin-bottom: 0.5rem; color: var(--text-primary);">Flexibilidade</h3>
                    <p style="font-size: 0.875rem; color: var(--text-secondary);">Horários flexíveis</p>
                </div>

                <div class="info-box-center">
                    <div class="icon-box bg-green-light">📞</div>
                    <h3 style="font-weight: bold; margin-bottom: 0.5rem; color: var(--text-primary);">Confirmação</h3>
                    <p style="font-size: 0.875rem; color: var(--text-secondary);">WhatsApp e E-mail</p>
                </div>

            </div>

        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
